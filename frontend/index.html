<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFS Cluster Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
        }
        h1, h2 { margin-top: 0; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }
        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        /* Node Styling */
        .node-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #253347;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            border-left: 4px solid var(--success);
        }
        .status-dot {
            height: 10px; width: 10px;
            background-color: var(--success);
            border-radius: 50%; display: inline-block;
            margin-right: 8px;
        }
        button {
            background-color: var(--accent); color: white;
            border: none; padding: 0.5rem 1rem; border-radius: 4px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { opacity: 0.8; }
        .btn-danger { background-color: var(--danger); }
        
        /* File Explorer */
        .upload-zone {
            border: 2px dashed var(--border);
            padding: 2rem; text-align: center;
            border-radius: 6px; margin-bottom: 1.5rem;
            color: var(--text-muted); transition: 0.2s;
        }
        .upload-zone:hover { border-color: var(--accent); color: var(--text-main); }
        .file-card {
            background: #253347; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;
        }
        .file-header {
            display: flex; justify-content: space-between; border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem; margin-bottom: 0.5rem;
        }
        .chunk-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem;
        }
        .chunk-box {
            background: #1e293b; padding: 0.5rem; border-radius: 4px; font-size: 0.85rem; border: 1px solid var(--border);
        }
        .node-tag {
            display: inline-block; background: var(--accent); color: white;
            padding: 2px 6px; border-radius: 12px; font-size: 0.75rem; margin: 2px;
        }
    </style>
</head>
<body>

    <h1>🚀 Distributed File System Controller</h1>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Real-time cluster monitoring and file replication map.</p>

    <div class="grid">
        <div class="panel">
            <h2>Live Data Nodes</h2>
            <div id="nodes-container">
                <p style="color: var(--text-muted);">Waiting for heartbeats...</p>
            </div>
        </div>

        <div class="panel">
            <h2>File Explorer</h2>
            
            <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <p>Drag & Drop a file here, or click to browse</p>
                <input type="file" id="file-input" style="display: none;" onchange="handleFileUpload(event.target.files[0])">
            </div>

            <div id="files-container">
                </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';

        // 1. Polling the Cluster Status every 2 seconds
        async function fetchStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`);
                if (!response.ok) throw new Error("Backend offline");
                const data = await response.json();
                renderNodes(data.activeNodes);
                renderFiles(data.files);
            } catch (error) {
                document.getElementById('nodes-container').innerHTML = `<p style="color: var(--danger);">Cannot connect to Master Node. Is it running?</p>`;
            }
        }

        // 2. Render the Data Nodes
        function renderNodes(nodes) {
            const container = document.getElementById('nodes-container');
            if (!nodes || nodes.length === 0) {
                container.innerHTML = `<p style="color: var(--danger);">CRITICAL: All nodes are offline!</p>`;
                return;
            }
            
            // Sort ports so they appear in order (9001, 9002, etc)
            nodes.sort();
            
            container.innerHTML = nodes.map(node => {
                const port = node.split(':')[1];
                return `
                <div class="node-card">
                    <div>
                        <span class="status-dot"></span>
                        <strong>Node ${port}</strong>
                    </div>
                    <button class="btn-danger" onclick="killNode('${port}')">Kill</button>
                </div>
                `;
            }).join('');
        }

        // 3. Render the Files and Chunks
        function renderFiles(files) {
            const container = document.getElementById('files-container');
            if (!files || files.length === 0) {
                container.innerHTML = `<p style="color: var(--text-muted);">No files stored in the cluster yet.</p>`;
                return;
            }

            container.innerHTML = files.map(file => `
                <div class="file-card">
                    <div class="file-header">
                        <strong>📄 ${file.filename}</strong>
                        <div>
                            <span style="color: var(--text-muted); margin-right: 1rem;">${(file.size / 1024).toFixed(2)} KB</span>
                            <button onclick="downloadFile('${file.filename}')">Download</button>
                        </div>
                    </div>
                    <div class="chunk-list">
                        ${file.chunks.map((chunk, index) => `
                            <div class="chunk-box">
                                <div style="color: var(--text-muted); margin-bottom: 4px;">Chunk ${index}</div>
                                ${chunk.nodes.map(node => `<span class="node-tag">${node.split(':')[1]}</span>`).join('')}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 4. API Actions
        async function killNode(port) {
            if(confirm(`Are you sure you want to assassinate Node ${port}?`)) {
                await fetch(`${API_BASE}/kill?port=${port}`);
                fetchStatus(); // Refresh UI instantly
            }
        }

        function downloadFile(filename) {
            // Trigger browser native download
            window.location.href = `${API_BASE}/download?filename=${filename}`;
        }

        async function handleFileUpload(file) {
            if (!file) return;
            document.querySelector('.upload-zone p').innerText = "Uploading and splitting file...";
            
            try {
                await fetch(`${API_BASE}/upload?filename=${file.name}`, {
                    method: 'POST',
                    body: file
                });
                document.querySelector('.upload-zone p').innerText = "Drag & Drop a file here, or click to browse";
                fetchStatus(); // Refresh UI to show the new file
            } catch (error) {
                alert("Upload failed. Is the cluster running?");
                document.querySelector('.upload-zone p').innerText = "Drag & Drop a file here, or click to browse";
            }
        }

        // Drag and drop visuals
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent)'; });
        dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--border)'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--border)';
            if (e.dataTransfer.files.length > 0) handleFileUpload(e.dataTransfer.files[0]);
        });

        // Start polling the server immediately
        fetchStatus();
        setInterval(fetchStatus, 2000);
    </script>
</body>
</html>
